name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_call:
    secrets:
      CODECOV_TOKEN:
        required: true
    outputs:
      publish:
        value: ${{ jobs.RustMeta.outputs.publish }}
  schedule:
    - cron: "0 4 * * 1"   # Mondays 04:00 UTC, aligned with wit-deps.yaml

env:
  CARGO_TERM_COLOR: always

permissions: read-all

jobs:
  RustMeta:
    name: Collect crate metadata
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.rustmeta.outputs.matrix }}
      publish: ${{ steps.rustmeta.outputs.publish }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: sv-tools/rust-metadata-action@4e7375355154e9cc49ebb10805dbcf2ce4860669 # v1.2.0
        id: rustmeta
  BuildJob:
    name: Build per crate
    needs: RustMeta
    strategy:
      matrix:
        args: ${{ fromJSON(needs.RustMeta.outputs.matrix) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
      - run: cargo build ${{ matrix.args }} --all-targets --verbose
  WasmBuildJob:
    name: Build SDK for wasm32-wasip2
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
      - run: cargo build --package oxidhome-sdk --target wasm32-wasip2 --all-targets --verbose
  ExamplesBuildJob:
    name: Build examples for wasm32-wasip2
    runs-on: ubuntu-latest
    strategy:
      matrix:
        example: [hello-world, simulated-switch, event-recorder]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
      - name: Build examples/${{ matrix.example }}
        # `--locked` so a drifted lockfile fails CI loudly instead of
        # being silently resolved on the runner.
        working-directory: examples/${{ matrix.example }}
        run: cargo build --target wasm32-wasip2 --locked --verbose
  Build:
    name: Build
    needs:
      - BuildJob
      - WasmBuildJob
      - ExamplesBuildJob
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Check status
        if: ${{ needs.BuildJob.result != 'success' || needs.WasmBuildJob.result != 'success' || needs.ExamplesBuildJob.result != 'success' }}
        run: exit 1
  Format:
    name: Check Rust code formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
      - run: cargo fmt --all --check --verbose
  Wit:
    name: Validate WIT
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
      - run: cargo install-tools
      - name: Verify wit/deps is populated
        run: |
          if [ ! -d wit/deps ] || [ -z "$(ls -A wit/deps 2>/dev/null)" ]; then
            echo "::error::wit/deps is missing or empty. Run 'wit-deps update' locally and commit the result."
            exit 1
          fi
      - name: Verify wit/deps is in sync with wit/deps.toml
        run: |
          wit-deps lock
          if ! git diff --quiet -- wit/deps wit/deps.lock; then
            echo "::error::wit/deps drifted from wit/deps.toml. Run 'wit-deps update' and commit."
            git --no-pager diff -- wit/deps wit/deps.lock
            exit 1
          fi
      - name: Validate WIT package + WASI imports
        run: wasm-tools component wit wit/
  Clippy:
    name: Check Rust code with Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
      - run: cargo install-tools
      - run: cargo clippy --all-features --all-targets --verbose -- --deny warnings
      - run: cargo clippy --all-features --all-targets --quiet --message-format=json | cargo-action-fmt
        if: failure()
  WasmClippy:
    name: Check SDK with Clippy for wasm32-wasip2
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
      - run: cargo install-tools
      - run: cargo clippy --package oxidhome-sdk --target wasm32-wasip2 --all-features --all-targets --verbose -- --deny warnings
      - run: cargo clippy --package oxidhome-sdk --target wasm32-wasip2 --all-features --all-targets --quiet --message-format=json | cargo-action-fmt
        if: failure()
  TestsJob:
    name: Tests per crate
    needs: RustMeta
    strategy:
      matrix:
        args: ${{ fromJSON(needs.RustMeta.outputs.matrix) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
      - run: cargo install-tools
      - name: Pre-build hello-world example for wasm32-wasip2
        # `oxidhome-core`'s Phase 2 integration test invokes
        # `cargo build` on `examples/hello-world`. Pre-building primes
        # the cache and surfaces wasm build failures with a clearer
        # error than the one buried in the test output. `--locked`
        # matches both the test invocation and `ExamplesBuildJob`.
        working-directory: examples/hello-world
        run: cargo build --target wasm32-wasip2 --locked
      - name: Pre-build simulated-switch example for wasm32-wasip2
        # Same shape as hello-world above — Phase 3's
        # `simulated_switch_round_trip` integration test uses this
        # artifact.
        working-directory: examples/simulated-switch
        run: cargo build --target wasm32-wasip2 --locked
      - name: Pre-build event-recorder example for wasm32-wasip2
        # Phase 3's `event_dispatch` integration test pairs the
        # recorder with the switch above to exercise the plugin-side
        # `on-event` dispatch path.
        working-directory: examples/event-recorder
        run: cargo build --target wasm32-wasip2 --locked
      - name: Run tests
        # `--all-features` flips every world feature on for `oxidhome-wit`
        # so all four worlds' compile-only smoke tests run; the other
        # crates have no features beyond default so the flag is a no-op
        # for them.
        working-directory: ${{ github.workspace }}
        run: cargo llvm-cov nextest ${{ matrix.args }} --all-features --all-targets --no-fail-fast --no-tests=pass --verbose
      - name: Prepare coverage report
        if: ${{ !cancelled() }}
        run: cargo llvm-cov report --lcov --output-path coverage.lcov
      - name: Upload coverage reports to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          report_type: test_results
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
  Tests:
    name: Tests
    needs: TestsJob
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Check status
        if: ${{ needs.TestsJob.result != 'success' }}
        run: exit 1
  Buf:
    name: Verify Connect-RPC codegen
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v6.0.0
        with:
          go-version: stable
      - name: Install buf + codegen plugins
        run: scripts/install-buf-tools.sh
      - name: Add tool binaries to PATH
        run: |
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - name: Lint .proto files
        run: buf lint
      - name: Regenerate Connect-RPC code
        run: buf generate
      - name: Apply rustfmt to the regen tree
        # The committed code is the post-`cargo fmt --all` form (the
        # dev pre-commit gate runs fmt across the whole workspace),
        # so the diff check below has to compare apples to apples.
        # Otherwise the only divergence ends up being rustfmt's
        # `max_width` wrap of buffa's long single-line `#![allow(…)]`
        # attributes, and CI fails on a non-substantive diff.
        run: cargo fmt --all
      - name: Verify committed code matches regen
        # If buf generate produced a different tree than what's
        # committed, the dev forgot to run regen + commit. Fail
        # loudly so the staleness can't reach main.
        run: |
          if ! git diff --quiet -- crates/oxidhome-proto/src/gen; then
            echo "::error::Connect-RPC generated code is stale. Run 'buf generate && cargo fmt --all' locally and commit the result."
            git --no-pager diff -- crates/oxidhome-proto/src/gen
            exit 1
          fi
  Deps:
    name: Check dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
      - run: cargo install-tools
      - name: Machete
        run: cargo machete
      - name: Deny
        run: cargo deny check all
  PublishJob:
    name: Test publishing per crate
    needs: RustMeta
    strategy:
      matrix:
        package: ${{ fromJSON(needs.RustMeta.outputs.publish) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
      - name: Dry run publish
        run: cargo publish --all-features --package ${{ matrix.package }} --dry-run --verbose
      - name: Create package
        run: cargo package --all-features --package ${{ matrix.package }} --verbose
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.package }}-crate
          path: target/package/${{ matrix.package }}-*.crate
  Publish:
    name: Test publishing
    needs:
      - RustMeta
      - PublishJob
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Check status
        if: ${{ needs.RustMeta.outputs.publish != '[]' && (needs.PublishJob.result == 'failure' || needs.PublishJob.result == 'cancelled') }}
        run: exit 1
  AllChecks:
    name: All checks
    needs:
      - RustMeta
      - Build
      - Format
      - Wit
      - Buf
      - Clippy
      - WasmClippy
      - Tests
      - Deps
      - Publish
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Verify all checks succeeded
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: exit 1
