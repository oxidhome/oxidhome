[workspace]
resolver = "3"
members = ["crates/oxidehome-core", "crates/oxidehome-sdk"]

[workspace.package]
version = "0.1.0"
edition = "2024"
rust-version = "1.95"
license = "MIT OR Apache-2.0"
repository = "https://github.com/oxidhome/oxidhome"
homepage = "https://github.com/oxidhome/oxidhome"
authors = ["The OxidHome Contributors"]

[workspace.lints.rust]
unsafe_code = "forbid"

[workspace.lints.clippy]
all = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }

[workspace.dependencies]
oxidehome-sdk = { path = "crates/oxidehome-sdk", version = "0.1.0" }
