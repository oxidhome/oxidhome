[workspace]
resolver = "3"
members = ["crates/oxidhome-core", "crates/oxidhome-sdk", "crates/oxidhome-wit"]

[workspace.package]
version = "0.1.0"
edition = "2024"
rust-version = "1.95"
license = "MIT OR Apache-2.0"
repository = "https://github.com/oxidhome/oxidhome"
homepage = "https://github.com/oxidhome/oxidhome"
authors = ["The OxidHome Contributors"]

[workspace.lints.rust]
# `unsafe` is denied by default. Crates and individual blocks may opt in
# with `#[allow(unsafe_code)]`, but every such use must be documented with
# a `// SAFETY:` comment justifying it. See CONTRIBUTING.md for the policy.
unsafe_code = "deny"

[workspace.lints.clippy]
all = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }

[workspace.dependencies]
oxidhome-sdk = { path = "crates/oxidhome-sdk", version = "0.1.0" }
oxidhome-wit = { path = "crates/oxidhome-wit", version = "0.1.0" }

# Shared external deps. Phase 2 adds tokio + tracing; the runtime/logging
# decisions in 00_OVERVIEW.md make these workspace-wide.
anyhow = "1.0.102"
thiserror = "2.0.18"
tokio = { version = "1.52.3", default-features = false, features = ["macros", "rt-multi-thread", "sync", "fs"] }
tracing = { version = "0.1.44", default-features = false, features = ["std"] }
tracing-subscriber = { version = "0.3.23", default-features = false, features = ["env-filter", "fmt", "registry"] }
