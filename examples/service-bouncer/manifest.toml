manifest_version = 1

[plugin]
id = "example.service-bouncer"
name = "Service Bouncer"
version = "0.1.0"
authors = ["The OxidHome Contributors"]
description = "Bounces `kick` to a target read from KV — Phase 7c cycle-detection fixture."
source = "https://github.com/oxidhome/oxidhome/tree/main/examples/service-bouncer"
license = "MIT OR Apache-2.0"
keywords = ["example", "service", "cycle"]
world = "plugin"
sdk_version = "0.1.0"

[runtime]
# Multi-instance so the dispatch test can spin up A *and* B from this
# manifest.
singleton = false

wasm = "target/wasm32-wasip2/debug/service_bouncer.wasm"

[capabilities]
declares_services = ["bouncer"]
# Bouncer reads `bounce_to` from KV — give it a tiny per-instance quota.
storage_quota_kb = 4
