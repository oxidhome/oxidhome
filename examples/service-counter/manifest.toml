manifest_version = 1

[plugin]
id = "example.service-counter"
name = "Service Counter"
version = "0.1.0"
authors = ["The OxidHome Contributors"]
description = "Registers a counter service — Phase 7 services fixture."
source = "https://github.com/oxidhome/oxidhome/tree/main/examples/service-counter"
license = "MIT OR Apache-2.0"
keywords = ["example", "service", "counter"]
world = "plugin"
sdk_version = "0.1.0"

[runtime]
wasm = "target/wasm32-wasip2/debug/service_counter.wasm"

[capabilities]
# The service `name` must be declared here, mirroring `declares_devices`.
declares_services = ["counter"]
