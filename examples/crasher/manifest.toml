manifest_version = 1

[plugin]
id = "example.crasher"
name = "Crasher"
version = "0.1.0"
authors = ["The OxidHome Contributors"]
description = "Crashes on demand — Phase 6c restart-policy test fixture."
source = "https://github.com/oxidhome/oxidhome/tree/main/examples/crasher"
license = "MIT OR Apache-2.0"
keywords = ["example", "test-fixture", "crash"]
world = "plugin"
sdk_version = "0.1.0"

[runtime]
wasm = "target/wasm32-wasip2/debug/crasher.wasm"
# The supervisor ticks at this cadence; the lifecycle `tick()` traps.
tick_interval_ms = 50
restart = "on-trap"

[config.crash_on]
# "tick" → init succeeds, the first tick traps; "init" → init fails.
type = "enum"
values = ["tick", "init"]
default = "tick"
description = "Which lifecycle hook the crasher fails in."
